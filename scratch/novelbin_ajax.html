    <style>
        .chapter-archive-grid {
            display: block;
        }

        .chapter-archive-row {
            display: flex;
            flex-wrap: wrap;
            margin-left: -15px;
            margin-right: -15px;
        }

        .chapter-archive-row + .chapter-archive-row {
            margin-top: 14px;
        }

        .chapter-archive-column {
            width: 100%;
            padding-left: 15px;
            padding-right: 15px;
        }

        .chapter-archive-column .list-chapter {
            margin-bottom: 0;
        }

        @media (min-width: 768px) {
            .chapter-archive-column {
                width: 33.33333333%;
            }
        }
    </style>

    <script>
        (function () {
            const grid = document.querySelector('[data-chapter-archive-grid]');
            const template = document.querySelector('[data-chapter-item-template]');
            if (!grid || !template) {
                return;
            }

            const itemMarkup = template.innerHTML.trim();
            const parserHost = document.createElement('ul');
            parserHost.innerHTML = itemMarkup;
            const items = Array.from(parserHost.querySelectorAll('[data-chapter-item]'));
            const groupSize = 15;
            const columnCount = 3;
            const itemsPerColumn = 5;

            for (let start = 0; start < items.length; start += groupSize) {
                const row = document.createElement('div');
                row.className = 'chapter-archive-row';

                const groupItems = items.slice(start, start + groupSize);

                for (let columnIndex = 0; columnIndex < columnCount; columnIndex++) {
                    const column = document.createElement('div');
                    column.className = 'chapter-archive-column';

                    const list = document.createElement('ul');
                    list.className = 'list-chapter';

                    const columnItems = groupItems.slice(
                        columnIndex * itemsPerColumn,
                        (columnIndex + 1) * itemsPerColumn
                    );

                    columnItems.forEach((item) => {
                        list.appendChild(item);
                    });

                    column.appendChild(list);
                    row.appendChild(column);
                }

                grid.appendChild(row);
            }
        })();
    </script>
