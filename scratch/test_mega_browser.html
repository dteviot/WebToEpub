<!DOCTYPE html>
<html>
<head>
    <title>Test Mega</title>
    <script src="../plugin/js/megajs.browser.js"></script>
    <script src="../plugin/js/MegaLibrary.js"></script>
</head>
<body>
    <div id="megaLibraryView">
        <span id="megaLibraryStatus"></span>
        <table id="megaLibraryResultsTable"><tbody></tbody></table>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.megaLibrary) {
                window.megaLibrary.loadFolder("https://mega.nz/folder/Ci4ETASB#KIFVuPI99P1Ytg0dxmtYlw").then(() => {
                    console.log("Loaded:", document.getElementById("megaLibraryStatus").innerText);
                    const rows = document.querySelectorAll("tr");
                    console.log("Found rows:", rows.length);
                });
            }
        });
    </script>
</body>
</html>
